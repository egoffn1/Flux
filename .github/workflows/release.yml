name: Release

on:
  push:
    tags:
      - 'v*'

env:
  JAVA_VERSION: '17'
  ANDROID_COMPILE_SDK: '34'
  ANDROID_BUILD_TOOLS: '34.0.0'

jobs:
  build-release:
    name: Build Release v${{ github.ref_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2
        with:
          sdk-version: ${{ env.ANDROID_COMPILE_SDK }}
          build-tools-version: ${{ env.ANDROID_BUILD_TOOLS }}

      - name: Update version in build.gradle.kts
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          sed -i "s/versionCode = [0-9]*/versionCode = $(echo "$TAG_VERSION" | tr -d '.')/" app/build.gradle.kts
          sed -i "s/versionName = \".*\"/versionName = \"$TAG_VERSION\"/" app/build.gradle.kts

      - name: Decode keystore
        if: secrets.KEYSTORE_BASE64 != ''
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.jks

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" >> local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build signed release AAB
        if: secrets.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_FILE: app/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease --warning-mode=all

      - name: Build signed universal APK
        if: secrets.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_FILE: app/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --warning-mode=all

      - name: Align unsigned APK
        if: secrets.KEYSTORE_BASE64 == ''
        run: ./gradlew assembleRelease --warning-mode=all

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%an)" $PREVIOUS_TAG..HEAD 2>/dev/null)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%an)" 2>/dev/null | head -20)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Rename APK for release
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          if [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
            cp "app/build/outputs/apk/release/app-release.apk" "app/build/outputs/apk/release/Flux-v$TAG_VERSION.apk"
          else
            cp "app/build/outputs/apk/release/app-release-unsigned.apk" "app/build/outputs/apk/release/Flux-v$TAG_VERSION-unsigned.apk"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Flux Music v${{ github.ref_name }}
          body: |
            ## Flux Music ${{ github.ref_name }}

            ### Changes:
            ${{ steps.changelog.outputs.changelog }}

            ### Download:
            - APK (signed) - for direct installation
            - AAB - for Google Play
          draft: false
          prerelease: false
          files: |
            app/build/outputs/apk/release/Flux-v*.apk
            app/build/outputs/bundle/release/app-release.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
